<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圓柱展開圖 - 布萊克吳數學實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body class="min-h-screen pb-12 flex flex-col">

    <!-- 導覽列 -->
    <nav class="bg-white shadow-md p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-shapes text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">布萊克吳數學實驗室</span>
            </a>
            <div class="text-sm text-gray-500">
                立體幾何：圓柱展開圖
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 flex-grow max-w-4xl">
        <!-- 返回按鈕 -->
        <a href="index5.html" class="inline-flex items-center text-indigo-600 hover:text-indigo-800 font-bold mb-6 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> 返回選單
        </a>

        <!-- 標題區 -->
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">圓柱展開圖</h1>
            <p class="text-gray-600">
                調整「摺疊進度」滑桿，觀察側面長方形如何捲曲成圓柱，且上下底圓如何貼合。您可以拖曳右側 3D 畫布來旋轉視角。
            </p>
        </header>

        <!-- 主體內容 -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 mb-8">
            
            <!-- 左側控制面板 (5 cols) -->
            <div class="md:col-span-5 flex flex-col space-y-6">
                <!-- 摺疊進度 -->
                <div class="bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-bold text-gray-700">摺疊進度</span>
                        <span id="valAngle-text" class="text-lg font-black text-indigo-600">0% (展開)</span>
                    </div>
                    <input type="range" id="sliderAngle" min="0" max="100" step="1" value="0" class="w-full h-2 bg-indigo-100 rounded-lg appearance-none cursor-pointer">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0% (平面展開)</span>
                        <span>100% (圓柱體)</span>
                    </div>
                </div>

                <!-- 尺寸控制 -->
                <div class="bg-white rounded-2xl p-6 shadow-lg border border-gray-100 space-y-4">
                    <h3 class="text-sm font-bold text-gray-800 border-b pb-2 mb-2">調整尺寸</h3>
                    <!-- 半徑 r -->
                    <div>
                        <div class="flex justify-between text-xs font-bold text-gray-500 mb-1">
                            <span>底圓半徑 r</span>
                            <span id="valR-text">20</span>
                        </div>
                        <input type="range" id="sliderR" min="15" max="30" value="20" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <!-- 高度 h -->
                    <div>
                        <div class="flex justify-between text-xs font-bold text-gray-500 mb-1">
                            <span>圓柱高度 h</span>
                            <span id="valH-text">80</span>
                        </div>
                        <input type="range" id="sliderH" min="40" max="100" value="80" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- 右側 3D 繪圖區 (7 cols) -->
            <div class="md:col-span-7 bg-white rounded-2xl p-6 shadow-xl border border-gray-100 flex flex-col items-center">
                
                <!-- 3D 畫布 -->
                <div class="w-full bg-slate-900 rounded-xl overflow-hidden border border-gray-800 relative mb-4">
                    <svg id="svg-canvas" class="w-full h-[350px]" viewBox="0 0 400 350" style="touch-action: none;">
                        <g id="scene-group"></g>
                        <text x="380" y="330" fill="white" font-size="10px" opacity="0.4" text-anchor="end">拖曳畫面可旋轉 3D 視角</text>
                    </svg>
                </div>

                <!-- 面積計算 -->
                <div class="w-full text-center bg-gray-50 py-3 rounded-xl border border-gray-100">
                    <div id="surface-area-text" class="text-xl font-bold text-indigo-600">
                        表面積 = 0 cm²
                    </div>
                    <div id="formula-text" class="text-xs text-gray-400 mt-1">
                        計算公式：2 × (π × r²) + (2 × π × r) × h
                    </div>
                </div>

            </div>

        </div>

    </main>

    <footer class="mt-auto py-8 text-center text-gray-400 text-sm">
        <p>© 2026 布萊克吳數學實驗室 | 幾何空間探索</p>
    </footer>

    <script>
        const canvas = document.getElementById('svg-canvas');
        const sceneGroup = document.getElementById('scene-group');
        
        const sliderAngle = document.getElementById('sliderAngle');
        const sliderR = document.getElementById('sliderR');
        const sliderH = document.getElementById('sliderH');

        const valAngleText = document.getElementById('valAngle-text');
        const valRText = document.getElementById('valR-text');
        const valHText = document.getElementById('valH-text');

        const surfaceAreaText = document.getElementById('surface-area-text');

        let rotX = -0.5;
        let rotY = 0.6;

        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function project(x, y, z) {
            const cosY = Math.cos(rotY);
            const sinY = Math.sin(rotY);
            let x1 = x * cosY - z * sinY;
            let z1 = x * sinY + z * cosY;

            const cosX = Math.cos(rotX);
            const sinX = Math.sin(rotX);
            let y2 = y * cosX - z1 * sinX;
            let z2 = y * sinX + z1 * cosX;

            return { x: 200 + x1, y: 165 - y2, depth: z2 };
        }

        // 產生一個面的 SVG 繪圖，若 vertices 數量多代表是多邊形/圓形
        function getFace(vertices, color, opacity, strokeColor = '#ffffff') {
            const projected = vertices.map(v => project(v.x, v.y, v.z));
            const avgDepth = projected.reduce((sum, p) => sum + p.depth, 0) / projected.length;
            const pointsStr = projected.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
            
            return {
                depth: avgDepth,
                svgHtml: `<polygon points="${pointsStr}" fill="${color}" fill-opacity="${opacity}" stroke="${strokeColor}" stroke-width="1.0" stroke-linejoin="round" />`
            };
        }

        function updateScene() {
            const t = parseFloat(sliderAngle.value) / 100; // 0 到 1.0
            const r = parseFloat(sliderR.value);
            const h = parseFloat(sliderH.value);

            valAngleText.textContent = t === 0 ? "0% (展開)" : (t === 1 ? "100% (圓柱)" : `${(t*100).toFixed(0)}%`);
            valRText.textContent = r.toFixed(0);
            valHText.textContent = h.toFixed(0);

            // 計算表面積
            const baseArea = Math.PI * r * r;
            const sideArea = 2 * Math.PI * r * h;
            const totalArea = 2 * baseArea + sideArea;
            surfaceAreaText.textContent = `表面積 = ${totalArea.toFixed(0)} cm²`;

            const faces = [];
            const segments = 24; // 側面和圓底剖分數

            // 1. 繪製側面長方形 (捲曲化)
            // 將長方形寬度 W = 2*PI*r 切割成 segments 個小長條
            const W = 2 * Math.PI * r;
            
            for (let i = 0; i < segments; i++) {
                const frac1 = i / segments;
                const frac2 = (i + 1) / segments;

                // 計算兩個邊界在 3D 的座標
                // Flat: x = (frac - 0.5) * W, z = 0
                // Rolled: x = r * sin(frac * 2*PI - PI), z = r + r * cos(frac * 2*PI - PI)
                // 為了讓滾動時基準點在正中央 (0, 0, 0)
                const getCoords = (frac) => {
                    const angle = frac * 2 * Math.PI - Math.PI;
                    const xFlat = (frac - 0.5) * W;
                    const zFlat = 0;

                    const xRolled = r * Math.sin(angle);
                    const zRolled = r + r * Math.cos(angle);

                    return {
                        x: (1 - t) * xFlat + t * xRolled,
                        z: (1 - t) * zFlat + t * zRolled
                    };
                };

                const pt1 = getCoords(frac1);
                const pt2 = getCoords(frac2);

                const vertices = [
                    { x: pt1.x, y: -h/2, z: pt1.z },
                    { x: pt2.x, y: -h/2, z: pt2.z },
                    { x: pt2.x, y: h/2, z: pt2.z },
                    { x: pt1.x, y: h/2, z: pt1.z }
                ];

                // 側面著色 (漸變交替，以呈現立體感)
                const shade = 100 + Math.sin(frac1 * Math.PI) * 50;
                const color = `rgb(${shade}, 92, 192)`; // 紫藍色漸層

                faces.push(getFace(vertices, color, 0.85, 'none'));
            }

            // 2. 繪製上下底圓
            // 圓在 flat 時是躺在 Y = -h/2 - r 處（下圓）和 Y = h/2 + r 處（上圓）
            // 摺疊時，下圓繞 Y = -h/2, Z = 0 線旋轉 theta = t * 90° 進入 Y-Z 面
            const theta = t * (Math.PI / 2);

            const getCircleVertices = (isTop) => {
                const yHinge = isTop ? h/2 : -h/2;
                const dir = isTop ? 1 : -1;
                
                const circlePts = [];
                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * 2 * Math.PI;
                    const localX = r * Math.cos(angle);
                    const localY = dir * r + dir * r * Math.sin(angle); // 相對 hinge 的位置

                    // 繞 X 軸旋轉摺疊 (以 hinge yHinge, z=0 為中心)
                    // Y_3d = yHinge + localY * cos(theta)
                    // Z_3d = r * (1 - cos(theta))? 
                    // 當 theta = 90 (t=1) 時，圓中心應在 (0, yHinge, r)
                    // 當 theta = 0 (t=0) 時，圓中心應在 (0, yHinge + dir*r, 0)
                    // 所以：
                    const y3d = yHinge + localY * Math.cos(theta);
                    const z3d = dir * localY * Math.sin(theta); // 展開時在 z=0, 摺起後在 z=r (由於 sine 和相切，中心 z 正好是 r)
                    
                    // 為了使 $t=1$ 時圓心在 $(0, yHinge, r)$
                    // 當 angle = -PI/2，localY = 0，此點是 hinge 點。其 y3d = yHinge, z3d = 0。
                    // 當 angle = PI/2，localY = 2*dir*r，y3d = yHinge + 2*dir*r*cos(theta), z3d = 2*r*sin(theta)
                    // 此公式完美滿足蓋子開合幾何！
                    circlePts.push({ x: localX, y: y3d, z: isTop ? z3d : -z3d }); // 下圓方向相反
                }
                return circlePts;
            };

            // 下底圓
            faces.push(getFace(getCircleVertices(false), '#ec4899', 0.85)); // 粉色
            // 上底圓
            faces.push(getFace(getCircleVertices(true), '#ec4899', 0.85));

            // 排序深度
            faces.sort((f1, f2) => f1.depth - f2.depth);

            // 繪製
            sceneGroup.innerHTML = faces.map(f => f.svgHtml).join('\n');
        }

        // 拖曳旋轉
        function onMouseDown(evt) {
            isDragging = true;
            if (evt.touches) {
                lastMouseX = evt.touches[0].clientX;
                lastMouseY = evt.touches[0].clientY;
            } else {
                lastMouseX = evt.clientX;
                lastMouseY = evt.clientY;
            }
        }

        function onMouseMove(evt) {
            if (!isDragging) return;
            let cx, cy;
            if (evt.touches) {
                cx = evt.touches[0].clientX;
                cy = evt.touches[0].clientY;
            } else {
                cx = evt.clientX;
                cy = evt.clientY;
            }

            const dx = cx - lastMouseX;
            const dy = cy - lastMouseY;

            rotY += dx * 0.01;
            rotX += dy * 0.01;

            rotX = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, rotX));

            lastMouseX = cx;
            lastMouseY = cy;

            updateScene();
        }

        function onMouseUp() {
            isDragging = false;
        }

        canvas.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        canvas.addEventListener('touchstart', onMouseDown, { passive: true });
        window.addEventListener('touchmove', onMouseMove, { passive: true });
        window.addEventListener('touchend', onMouseUp);

        sliderAngle.addEventListener('input', updateScene);
        sliderR.addEventListener('input', updateScene);
        sliderH.addEventListener('input', updateScene);

        // 初始繪製
        updateScene();
    </script>
</body>
</html>
