<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外心 (Circumcenter) - 布萊克吳數學實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
        }
        .draggable {
            cursor: move;
            fill: #4f46e5;
            transition: r 0.1s ease;
        }
        .draggable:hover {
            r: 10;
        }
    </style>
</head>
<body class="min-h-screen pb-12 flex flex-col">

    <!-- 導覽列 -->
    <nav class="bg-white shadow-md p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-shapes text-indigo-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">布萊克吳數學實驗室</span>
            </a>
            <div class="text-sm text-gray-500">
                三角形三心：外心 (Circumcenter)
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 flex-grow max-w-4xl">
        <!-- 返回按鈕 -->
        <a href="index2.html" class="inline-flex items-center text-indigo-600 hover:text-indigo-800 font-bold mb-6 transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> 返回選單
        </a>

        <!-- 標題區 -->
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">外心 (Circumcenter)</h1>
            <p class="text-gray-600">
                外心是三角形<b>三邊中垂線（垂直平分線）的交點</b>。外心到三角形三個頂點的距離相等，此相等距離即為<b>外接圓的半徑</b>。
            </p>
        </header>

        <!-- 畫布與編輯區 -->
        <div class="bg-white rounded-2xl p-6 shadow-xl border border-gray-100 mb-8 flex flex-col items-center">
            
            <!-- 快速切換按鈕 -->
            <div class="flex space-x-3 mb-6">
                <button onclick="setTriangle('acute')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-4 py-2 rounded-xl text-sm transition-colors">
                    銳角三角形 (外心在內部)
                </button>
                <button onclick="setTriangle('right')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-4 py-2 rounded-xl text-sm transition-colors">
                    直角三角形 (外心在斜邊中點)
                </button>
                <button onclick="setTriangle('obtuse')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-4 py-2 rounded-xl text-sm transition-colors">
                    鈍角三角形 (外心在外部)
                </button>
            </div>

            <div class="w-full max-w-2xl bg-slate-50 rounded-xl overflow-hidden border border-gray-200 relative mb-6">
                <!-- SVG 畫布 -->
                <svg id="svg-canvas" class="w-full h-[400px]" viewBox="0 0 600 400" style="touch-action: none;">
                    <!-- 外接圓 -->
                    <circle id="circumcircle" cx="0" cy="0" r="0" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="2,2"></circle>

                    <!-- 三角形面 -->
                    <polygon id="triangle-polygon" points="0,0 0,0 0,0" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"></polygon>

                    <!-- 三邊中垂線 -->
                    <line id="bisector-AB" stroke="#10b981" stroke-width="1.5" opacity="0.7"></line>
                    <line id="bisector-BC" stroke="#10b981" stroke-width="1.5" opacity="0.7"></line>
                    <line id="bisector-CA" stroke="#10b981" stroke-width="1.5" opacity="0.7"></line>

                    <!-- 到頂點等距離虛線 -->
                    <line id="dist-OA" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4"></line>
                    <line id="dist-OB" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4"></line>
                    <line id="dist-OC" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,4"></line>

                    <!-- 三角形主體線 -->
                    <line id="side-AB" stroke="#475569" stroke-width="3"></line>
                    <line id="side-BC" stroke="#475569" stroke-width="3"></line>
                    <line id="side-CA" stroke="#475569" stroke-width="3"></line>

                    <!-- 中點標示 -->
                    <circle id="mid-AB" cx="0" cy="0" r="3" fill="#10b981"></circle>
                    <circle id="mid-BC" cx="0" cy="0" r="3" fill="#10b981"></circle>
                    <circle id="mid-CA" cx="0" cy="0" r="3" fill="#10b981"></circle>

                    <!-- 外心點 O -->
                    <circle id="center-point" cx="0" cy="0" r="6" fill="#ef4444"></circle>
                    <text id="center-label" font-weight="bold" font-size="14px" fill="#ef4444"></text>

                    <!-- 頂點標籤 -->
                    <text id="label-A" font-weight="bold" font-size="16px" fill="#1e293b">A</text>
                    <text id="label-B" font-weight="bold" font-size="16px" fill="#1e293b">B</text>
                    <text id="label-C" font-weight="bold" font-size="16px" fill="#1e293b">C</text>

                    <!-- 拖曳端點 -->
                    <circle id="vertex-A" class="draggable" cx="300" cy="80" r="7"></circle>
                    <circle id="vertex-B" class="draggable" cx="150" cy="300" r="7"></circle>
                    <circle id="vertex-C" class="draggable" cx="450" cy="300" r="7"></circle>
                </svg>
            </div>

            <!-- 計算結果文字 -->
            <div id="stats-panel" class="text-center bg-gray-50 px-8 py-4 rounded-xl border border-gray-100 w-full max-w-lg space-y-1">
                <div id="distance-info" class="text-lg font-bold text-blue-600">
                    OA = OB = OC = 0.0 px (外接圓半徑)
                </div>
                <div id="angle-info" class="text-sm text-gray-500">
                    目前三角形為：銳角三角形
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-auto py-8 text-center text-gray-400 text-sm">
        <p>© 2026 布萊克吳數學實驗室 | 用視覺學幾何</p>
    </footer>

    <script>
        const svg = document.getElementById('svg-canvas');
        const polygon = document.getElementById('triangle-polygon');
        
        const vertexA = document.getElementById('vertex-A');
        const vertexB = document.getElementById('vertex-B');
        const vertexC = document.getElementById('vertex-C');

        const sideAB = document.getElementById('side-AB');
        const sideBC = document.getElementById('side-BC');
        const sideCA = document.getElementById('side-CA');

        const bisectorAB = document.getElementById('bisector-AB');
        const bisectorBC = document.getElementById('bisector-BC');
        const bisectorCA = document.getElementById('bisector-CA');

        const distOA = document.getElementById('dist-OA');
        const distOB = document.getElementById('dist-OB');
        const distOC = document.getElementById('dist-OC');

        const midAB = document.getElementById('mid-AB');
        const midBC = document.getElementById('mid-BC');
        const midCA = document.getElementById('mid-CA');

        const centerPoint = document.getElementById('center-point');
        const centerLabel = document.getElementById('center-label');
        const circumcircle = document.getElementById('circumcircle');

        const labelA = document.getElementById('label-A');
        const labelB = document.getElementById('label-B');
        const labelC = document.getElementById('label-C');

        const distanceInfo = document.getElementById('distance-info');
        const angleInfo = document.getElementById('angle-info');

        let pts = {
            A: { x: 300, y: 80 },
            B: { x: 150, y: 300 },
            C: { x: 450, y: 300 }
        };

        let activeVertex = null;

        // 設定預設三角形
        const presets = {
            acute: {
                A: { x: 300, y: 80 },
                B: { x: 150, y: 300 },
                C: { x: 450, y: 300 }
            },
            right: {
                A: { x: 200, y: 100 },
                B: { x: 200, y: 300 },
                C: { x: 480, y: 300 }
            },
            obtuse: {
                A: { x: 300, y: 200 },
                B: { x: 100, y: 300 },
                C: { x: 500, y: 300 }
            }
        };

        function setTriangle(type) {
            pts = JSON.parse(JSON.stringify(presets[type]));
            drawScene();
        }

        // 計算外心座標
        function getCircumcenter(A, B, C) {
            const D = 2 * (A.x * (B.y - C.y) + B.x * (C.y - A.y) + C.x * (A.y - B.y));
            if (Math.abs(D) < 0.001) return { x: 300, y: 200 }; // 共線保護

            const ux = ((A.x*A.x + A.y*A.y) * (B.y - C.y) + (B.x*B.x + B.y*B.y) * (C.y - A.y) + (C.x*C.x + C.y*C.y) * (A.y - B.y)) / D;
            const uy = ((A.x*A.x + A.y*A.y) * (C.x - B.x) + (B.x*B.x + B.y*B.y) * (A.x - C.x) + (C.x*C.x + C.y*C.y) * (B.x - A.x)) / D;

            return { x: ux, y: uy };
        }

        // 畫出通過中點並垂直於線段的線 (中垂線)
        function drawPerpendicularBisector(lineEl, p1, p2, center) {
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;

            // 邊向量
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;

            // 垂直向量
            const px = -dy;
            const py = dx;

            // 延伸長度，畫一條長線
            const len = 800; 
            const d = Math.hypot(px, py);
            const ux = px / d;
            const uy = py / d;

            lineEl.setAttribute('x1', midX - len * ux);
            lineEl.setAttribute('y1', midY - len * uy);
            lineEl.setAttribute('x2', midX + len * ux);
            lineEl.setAttribute('y2', midY + len * uy);
        }

        function getAngle(p1, p2, p3) {
            const v1 = { x: p1.x - p2.x, y: p1.y - p2.y };
            const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
            const dot = v1.x * v2.x + v1.y * v2.y;
            const det = v1.x * v2.y - v1.y * v2.x;
            return Math.abs(Math.atan2(det, dot));
        }

        function drawScene() {
            // 限制邊界
            for (let k in pts) {
                pts[k].x = Math.max(20, Math.min(580, pts[k].x));
                pts[k].y = Math.max(20, Math.min(350, pts[k].y));
            }

            // 更新端點位置
            vertexA.setAttribute('cx', pts.A.x); vertexA.setAttribute('cy', pts.A.y);
            vertexB.setAttribute('cx', pts.B.x); vertexB.setAttribute('cy', pts.B.y);
            vertexC.setAttribute('cx', pts.C.x); vertexC.setAttribute('cy', pts.C.y);

            // 更新三角形面
            polygon.setAttribute('points', `${pts.A.x},${pts.A.y} ${pts.B.x},${pts.B.y} ${pts.C.x},${pts.C.y}`);

            // 更新三角形邊線
            sideAB.setAttribute('x1', pts.A.x); sideAB.setAttribute('y1', pts.A.y); sideAB.setAttribute('x2', pts.B.x); sideAB.setAttribute('y2', pts.B.y);
            sideBC.setAttribute('x1', pts.B.x); sideBC.setAttribute('y1', pts.B.y); sideBC.setAttribute('x2', pts.C.x); sideBC.setAttribute('y2', pts.C.y);
            sideCA.setAttribute('x1', pts.C.x); sideCA.setAttribute('y1', pts.C.y); sideCA.setAttribute('x2', pts.A.x); sideCA.setAttribute('y2', pts.A.y);

            // 中點位置
            midAB.setAttribute('cx', (pts.A.x + pts.B.x) / 2); midAB.setAttribute('cy', (pts.A.y + pts.B.y) / 2);
            midBC.setAttribute('cx', (pts.B.x + pts.C.x) / 2); midBC.setAttribute('cy', (pts.B.y + pts.C.y) / 2);
            midCA.setAttribute('cx', (pts.C.x + pts.A.x) / 2); midCA.setAttribute('cy', (pts.C.y + pts.A.y) / 2);

            // 計算外心 O
            const O = getCircumcenter(pts.A, pts.B, pts.C);
            centerPoint.setAttribute('cx', O.x);
            centerPoint.setAttribute('cy', O.y);
            centerLabel.setAttribute('x', O.x + 10);
            centerLabel.setAttribute('y', O.y - 10);
            centerLabel.textContent = `O (外心)`;

            // 繪製三邊中垂線
            drawPerpendicularBisector(bisectorAB, pts.A, pts.B, O);
            drawPerpendicularBisector(bisectorBC, pts.B, pts.C, O);
            drawPerpendicularBisector(bisectorCA, pts.C, pts.A, O);

            // 計算外接圓半徑 R
            const R = Math.hypot(O.x - pts.A.x, O.y - pts.A.y);
            
            // 繪製外接圓
            circumcircle.setAttribute('cx', O.x);
            circumcircle.setAttribute('cy', O.y);
            circumcircle.setAttribute('r', R);

            // 繪製等距離虛線
            distOA.setAttribute('x1', O.x); distOA.setAttribute('y1', O.y); distOA.setAttribute('x2', pts.A.x); distOA.setAttribute('y2', pts.A.y);
            distOB.setAttribute('x1', O.x); distOB.setAttribute('y1', O.y); distOB.setAttribute('x2', pts.B.x); distOB.setAttribute('y2', pts.B.y);
            distOC.setAttribute('x1', O.x); distOC.setAttribute('y1', O.y); distOC.setAttribute('x2', pts.C.x); distOC.setAttribute('y2', pts.C.y);

            // 頂點標籤
            labelA.setAttribute('x', pts.A.x); labelA.setAttribute('y', pts.A.y - 15);
            labelB.setAttribute('x', pts.B.x - 20); labelB.setAttribute('y', pts.B.y + 20);
            labelC.setAttribute('x', pts.C.x + 10); labelC.setAttribute('y', pts.C.y + 20);

            // 更新數據顯示
            distanceInfo.textContent = `OA = OB = OC = ${R.toFixed(1)} px (外接圓半徑)`;

            // 判定角類型
            const angA = getAngle(pts.B, pts.A, pts.C);
            const angB = getAngle(pts.A, pts.B, pts.C);
            const angC = Math.PI - angA - angB;

            const rad90 = Math.PI / 2;
            const threshold = 0.02; // 用於直角容差

            let typeStr = "";
            if (Math.abs(angA - rad90) < threshold || Math.abs(angB - rad90) < threshold || Math.abs(angC - rad90) < threshold) {
                typeStr = "直角三角形 (外心在最長斜邊的中點上)";
            } else if (angA > rad90 || angB > rad90 || angC > rad90) {
                typeStr = "鈍角三角形 (外心在三角形的外部)";
            } else {
                typeStr = "銳角三角形 (外心在三角形的內部)";
            }
            angleInfo.textContent = `目前三角形為：${typeStr}`;
        }

        // 拖曳處理
        function getMousePos(evt) {
            const rect = svg.getBoundingClientRect();
            const scaleX = 600 / rect.width;
            const scaleY = 400 / rect.height;
            if (evt.touches) {
                return {
                    x: (evt.touches[0].clientX - rect.left) * scaleX,
                    y: (evt.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function onStart(evt) {
            const pos = getMousePos(evt);
            const threshold = 15;
            for (let k in pts) {
                const dist = Math.hypot(pts[k].x - pos.x, pts[k].y - pos.y);
                if (dist < threshold) {
                    activeVertex = k;
                    evt.preventDefault();
                    break;
                }
            }
        }

        function onMove(evt) {
            if (!activeVertex) return;
            const pos = getMousePos(evt);
            pts[activeVertex].x = pos.x;
            pts[activeVertex].y = pos.y;
            drawScene();
            evt.preventDefault();
        }

        function onEnd() {
            activeVertex = null;
        }

        // 監聽事件
        svg.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        svg.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);

        // 初始繪製
        drawScene();
    </script>
</body>
</html>
